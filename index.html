<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇱🇰 Lanka News Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0b0f1a;
    --surface:  #111827;
    --card:     #1a2235;
    --border:   #1e2d45;
    --gold:     #c9a84c;
    --gold-dim: #7a6030;
    --saffron:  #e07b2a;
    --text:     #e8e4d9;
    --text-dim: #7a8499;
    --text-mid: #b0bac8;
    --green:    #22c55e;
    --red:      #ef4444;
    --radius:   10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

/* HEADER */
header {
background: linear-gradient(135deg, #0b0f1a 0%, #111827 100%);
border-bottom: 1px solid var(–border);
padding: 0 24px;
position: sticky; top: 0; z-index: 100;
}
.header-inner {
max-width: 1100px; margin: 0 auto;
display: flex; align-items: center; justify-content: space-between;
height: 64px; gap: 16px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
width: 38px; height: 38px;
background: linear-gradient(135deg, var(–gold), var(–saffron));
border-radius: 8px; display: flex; align-items: center;
justify-content: center; font-size: 20px; flex-shrink: 0;
}
.logo-text { font-family: ‘Playfair Display’, serif; font-size: 18px; font-weight: 700; line-height: 1.1; }
.logo-sub { font-size: 10px; color: var(–gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
.header-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(–text-dim); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(–text-dim); transition: background 0.3s; }
.status-dot.live  { background: var(–green); box-shadow: 0 0 6px var(–green); }
.status-dot.error { background: var(–red); }

/* MAIN */
main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

/* CONTROLS */
.controls {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 20px; margin-bottom: 24px;
}
.key-row { display: flex; gap: 8px; margin-bottom: 16px; }
.key-input {
flex: 1; background: #0b0f1a; border: 1px solid var(–border);
border-radius: 8px; padding: 10px 14px; color: var(–text);
font-size: 13px; font-family: ‘Inter’, sans-serif; outline: none;
transition: border-color 0.2s;
}
.key-input:focus { border-color: var(–gold-dim); }
.key-input.ok    { border-color: var(–green); }
.eye-btn {
background: transparent; border: 1px solid var(–border);
border-radius: 8px; padding: 10px 13px; color: var(–text-dim);
cursor: pointer; font-size: 15px; transition: all 0.2s;
}
.eye-btn:hover { border-color: var(–gold-dim); color: var(–text); }

.controls-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.controls-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(–text-dim); font-weight: 600; white-space: nowrap; }

/* TABS */
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-tab {
padding: 7px 15px; border-radius: 20px; border: 1px solid var(–border);
background: transparent; color: var(–text-dim); font-size: 13px;
font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: ‘Inter’, sans-serif;
}
.cat-tab:hover { border-color: var(–gold-dim); color: var(–text); }
.cat-tab.active { background: linear-gradient(135deg, var(–gold), var(–saffron)); border-color: transparent; color: #000; font-weight: 700; }

/* LANG TOGGLE */
.lang-toggle { display: flex; border: 1px solid var(–border); border-radius: 8px; overflow: hidden; margin-left: auto; }
.lang-btn { padding: 7px 14px; background: transparent; border: none; color: var(–text-dim); font-size: 12px; font-weight: 600; cursor: pointer; font-family: ‘Inter’, sans-serif; transition: all 0.2s; }
.lang-btn.active { background: var(–gold); color: #000; }

/* FETCH BTN */
.fetch-btn {
width: 100%; padding: 12px; border: none; border-radius: 8px;
background: linear-gradient(135deg, var(–gold), var(–saffron));
color: #000; font-size: 14px; font-weight: 700; cursor: pointer;
font-family: ‘Inter’, sans-serif; transition: all 0.2s;
display: flex; align-items: center; justify-content: center; gap: 8px;
}
.fetch-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
.fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner {
width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3);
border-top-color: #000; border-radius: 50%;
animation: spin 0.7s linear infinite; display: none;
}
.fetch-btn.loading .spinner { display: block; }
.fetch-btn.loading .btn-text { opacity: 0.6; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.error-bar {
background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
border-radius: 8px; padding: 12px 16px; color: #f87171;
font-size: 13px; margin-bottom: 20px; display: none;
}
.error-bar.show { display: block; }

/* SECTION LABEL */
.section-label { display: none; align-items: center; gap: 10px; margin-bottom: 20px; }
.section-label-text { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(–gold); font-weight: 600; }
.section-label-line { flex: 1; height: 1px; background: var(–border); }
.section-label-count { font-size: 11px; color: var(–text-dim); background: var(–surface); border: 1px solid var(–border); padding: 2px 10px; border-radius: 20px; }

/* GRID */
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

/* CARD */
.news-card {
background: var(–card); border: 1px solid var(–border);
border-radius: var(–radius); overflow: hidden;
transition: all 0.25s; display: flex; flex-direction: column;
}
.news-card:hover { border-color: var(–gold-dim); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
.card-img {
height: 185px; background: var(–surface); position: relative;
overflow: hidden; display: flex; align-items: center;
justify-content: center; font-size: 42px; color: var(–text-dim);
}
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-img-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, var(–card), transparent); }
.card-badge {
position: absolute; top: 10px; left: 10px;
background: rgba(0,0,0,0.75); border: 1px solid var(–gold-dim);
color: var(–gold); font-size: 10px; font-weight: 700;
letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase;
}
.card-body { padding: 16px; display: flex; flex-direction: column; flex: 1; gap: 10px; }
.card-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; flex-wrap: wrap; }
.card-time { color: var(–text-dim); }
.card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(–text-dim); }
.card-cat { background: rgba(201,168,76,0.15); color: var(–gold); border: 1px solid rgba(201,168,76,0.25); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.card-si  { background: rgba(224,123,42,0.15); color: var(–saffron); border: 1px solid rgba(224,123,42,0.25); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.card-title { font-size: 15px; font-weight: 600; line-height: 1.45; color: var(–text); }
.card-title.si { font-family: ‘Noto Sans Sinhala’, sans-serif; font-size: 14px; line-height: 1.8; }
.card-desc { font-size: 13px; color: var(–text-mid); line-height: 1.6; flex: 1; }
.card-desc.si { font-family: ‘Noto Sans Sinhala’, sans-serif; font-size: 12px; line-height: 2; }
.card-footer { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(–border); }
.card-link {
flex: 1; padding: 8px; background: transparent; border: 1px solid var(–border);
border-radius: 6px; color: var(–text-dim); font-size: 12px; font-weight: 500;
cursor: pointer; text-decoration: none; text-align: center;
transition: all 0.2s; font-family: ‘Inter’, sans-serif;
display: flex; align-items: center; justify-content: center; gap: 4px;
}
.card-link:hover { border-color: var(–gold-dim); color: var(–gold); }
.card-detail-btn {
flex: 2; padding: 8px;
background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(224,123,42,0.1));
border: 1px solid var(–gold-dim); border-radius: 6px;
color: var(–gold); font-size: 12px; font-weight: 600;
cursor: pointer; font-family: ‘Inter’, sans-serif; transition: all 0.2s;
display: flex; align-items: center; justify-content: center; gap: 4px;
}
.card-detail-btn:hover { background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(224,123,42,0.2)); }

/* MODAL */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.85); z-index: 200;
align-items: center; justify-content: center;
padding: 20px; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
background: var(–surface); border: 1px solid var(–border);
border-radius: 14px; width: 100%; max-width: 680px;
max-height: 88vh; display: flex; flex-direction: column; overflow: hidden;
}
.modal-head {
padding: 18px 20px; border-bottom: 1px solid var(–border);
display: flex; align-items: flex-start; gap: 12px;
}
.modal-title { flex: 1; font-size: 15px; font-weight: 600; line-height: 1.45; }
.modal-title.si { font-family: ‘Noto Sans Sinhala’, sans-serif; font-size: 14px; line-height: 1.9; }
.modal-close { background: none; border: none; color: var(–text-dim); font-size: 20px; cursor: pointer; flex-shrink: 0; line-height: 1; }
.modal-close:hover { color: var(–text); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; font-size: 12px; color: var(–text-dim); flex-wrap: wrap; }
.modal-img { width: 100%; border-radius: 8px; margin-bottom: 16px; display: none; }
.modal-content { font-size: 14px; line-height: 1.85; color: var(–text-mid); }
.modal-content.si { font-family: ‘Noto Sans Sinhala’, sans-serif; font-size: 13px; line-height: 2.2; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(–border); display: flex; gap: 10px; }
.modal-open-btn {
flex: 1; padding: 10px;
background: linear-gradient(135deg, var(–gold), var(–saffron));
border: none; border-radius: 8px; color: #000; font-size: 13px;
font-weight: 700; cursor: pointer; font-family: ‘Inter’, sans-serif;
text-decoration: none; text-align: center;
display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* DEBUG */
.debug-panel { background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius); padding: 16px; margin-top: 32px; display: none; }
.debug-panel.show { display: block; }
.debug-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(–gold); font-weight: 600; margin-bottom: 12px; }
.debug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 14px; }
.debug-stat { background: var(–card); border: 1px solid var(–border); border-radius: 8px; padding: 12px; }
.debug-stat-val { font-size: 22px; font-weight: 700; color: var(–gold); }
.debug-stat-label { font-size: 11px; color: var(–text-dim); margin-top: 2px; }
.debug-raw { background: #0a0e18; border: 1px solid var(–border); border-radius: 8px; padding: 14px; font-family: ‘Courier New’, monospace; font-size: 11px; color: #7dd3a8; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; line-height: 1.6; }

/* EMPTY */
.empty-state { text-align: center; padding: 80px 20px; color: var(–text-dim); }
.empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-size: 18px; font-weight: 600; color: var(–text-mid); margin-bottom: 8px; }
.empty-sub { font-size: 14px; line-height: 1.6; }

/* TOAST */
.toast {
position: fixed; bottom: 24px; right: 24px;
background: var(–surface); border: 1px solid var(–gold-dim);
color: var(–gold); padding: 10px 18px; border-radius: 8px;
font-size: 13px; font-weight: 500; opacity: 0;
transform: translateY(10px); transition: all 0.25s;
z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 600px) {
.news-grid { grid-template-columns: 1fr; }
.controls-row { flex-direction: column; align-items: flex-start; }
.lang-toggle { margin-left: 0; }
}
</style>

</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🇱🇰</div>
      <div>
        <div class="logo-text">Lanka News Feed</div>
        <div class="logo-sub">Ada Derana RSS</div>
      </div>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
  </div>
</header>

<main>
  <!-- Controls -->
  <div class="controls">
    <div class="controls-row">
      <span class="controls-label">Category</span>
      <div class="cat-tabs">
        <button class="cat-tab active" onclick="setCat(this,'general')">🌐 General</button>
        <button class="cat-tab" onclick="setCat(this,'business')">💼 Business</button>
        <button class="cat-tab" onclick="setCat(this,'sports')">⚽ Sports</button>
        <button class="cat-tab" onclick="setCat(this,'entertainment')">🎭 Entertainment</button>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang(this,'en')">EN</button>
        <button class="lang-btn" onclick="setLang(this,'si')">සිං</button>
      </div>
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchNews()">
      <div class="spinner"></div>
      <span class="btn-text">🔄 Fetch Latest News from Ada Derana</span>
    </button>
  </div>

  <div class="error-bar" id="errorBar"></div>

  <div class="section-label" id="sectionLabel">
    <span class="section-label-text">Latest Articles</span>
    <div class="section-label-line"></div>
    <span class="section-label-count" id="articleCount">0 articles</span>
  </div>

  <div id="newsContainer">
    <div class="empty-state">
      <div class="empty-icon">📰</div>
      <div class="empty-title">No news loaded yet</div>
      <div class="empty-sub">Select a category and language,<br>then click Fetch to load live news from Ada Derana.</div>
    </div>
  </div>

  <!-- Debug Panel -->

  <div class="debug-panel" id="debugPanel">
    <div class="debug-title">🔧 Debug Info</div>
    <div class="debug-grid">
      <div class="debug-stat"><div class="debug-stat-val" id="dbItems">—</div><div class="debug-stat-label">Items in feed</div></div>
      <div class="debug-stat"><div class="debug-stat-val" id="dbImages">—</div><div class="debug-stat-label">With images</div></div>
      <div class="debug-stat"><div class="debug-stat-val" id="dbContent">—</div><div class="debug-stat-label">With content</div></div>
      <div class="debug-stat"><div class="debug-stat-val" id="dbProxy">—</div><div class="debug-stat-label">Proxy used</div></div>
    </div>
    <div class="debug-title">Raw XML Preview</div>
    <div class="debug-raw" id="dbRaw">—</div>
  </div>
</main>

<!-- Modal -->

<div class="modal-overlay" id="modalOverlay" onclick="bgClose(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modalMeta"></div>
      <img class="modal-img" id="modalImg" alt="">
      <div class="modal-content" id="modalContent"></div>
    </div>
    <div class="modal-foot">
      <a class="modal-open-btn" id="modalLink" href="#" target="_blank">🔗 Open on Ada Derana</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let cat      = 'general';
let lang     = 'en';
let articles = [];

// ── RSS FEED MAP ──
const rssMap = {
  en: {
    general:       'https://www.adaderana.lk/rss.php',
    business:      'https://bizenglish.adaderana.lk/feed/',
    sports:        'https://www.adaderana.lk/rss.php',
    entertainment: 'https://www.adaderana.lk/rss.php'
  },
  si: {
    general:       'https://sinhala.adaderana.lk/sinhala_news.php?mode=rss',
    business:      'https://sinhala.adaderana.lk/sinhala_news.php?mode=rss',
    sports:        'https://sinhala.adaderana.lk/sinhala_news.php?mode=rss',
    entertainment: 'https://sinhala.adaderana.lk/sinhala_news.php?mode=rss'
  }
};

// ── PROXY LIST ──
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`
];

function setCat(btn, c) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cat = c;
}

function setLang(btn, l) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  lang = l;
}

// ── FETCH WITH PROXY FALLBACK ──
async function fetchWithProxy(rssUrl) {
  let lastErr = '';
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = PROXIES[i](rssUrl);
    try {
      console.log(`Proxy ${i+1}: ${proxyUrl.split('?')[0]}`);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(9000) });
      if (!r.ok) { lastErr = `HTTP ${r.status}`; continue; }
      const text = await r.text();
      if (text && (text.includes('<item>') || text.includes('<item '))) {
        document.getElementById('dbProxy').textContent = `#${i+1}`;
        return text;
      }
      lastErr = 'Response has no <item> tags';
    } catch(e) { lastErr = e.message; }
  }
  throw new Error(`All proxies failed. Last error: ${lastErr}`);
}

// ── MAIN FETCH ──
async function fetchNews() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.classList.add('loading');
  setStatus('loading', 'Fetching...');
  hideErr();

  try {
    const rssUrl = rssMap[lang][cat] || rssMap['en']['general'];
    console.log('Target RSS:', rssUrl);

    const xmlText = await fetchWithProxy(rssUrl);

    // Debug raw
    document.getElementById('debugPanel').classList.add('show');
    document.getElementById('dbRaw').textContent = xmlText.substring(0, 800);

    // Parse XML
    const parser = new DOMParser();
    const xml    = parser.parseFromString(xmlText, 'application/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse failed.');

    const items = Array.from(xml.getElementsByTagName('item'));
    document.getElementById('dbItems').textContent = items.length;
    if (items.length === 0) throw new Error('No articles found in feed.');

    let imgCount = 0, contentCount = 0;

    articles = items.slice(0, 9).map(item => {
      const get  = tag => item.getElementsByTagName(tag)[0]?.textContent?.trim() || '';
      const desc = get('description');
      const contentEnc = item.getElementsByTagName('content:encoded')[0]?.textContent?.trim() || '';
      const media      = item.getElementsByTagName('media:content')[0];
      const mediaTh    = item.getElementsByTagName('media:thumbnail')[0];
      const encl       = item.getElementsByTagName('enclosure')[0];

      const image =
        media?.getAttribute('url')  ||
        mediaTh?.getAttribute('url') ||
        encl?.getAttribute('url')   ||
        extractImg(contentEnc)       ||
        extractImg(desc)             ||
        null;

      const content = contentEnc || desc || '';
      if (image)           imgCount++;
      if (content.length > 80) contentCount++;

      return {
        title:       get('title'),
        description: stripHTML(desc),
        content:     content,
        url:         get('link'),
        image:       image,
        publishedAt: get('pubDate') || new Date().toISOString(),
        source:      'Ada Derana',
        lang:        lang
      };
    });

    document.getElementById('dbImages').textContent  = imgCount;
    document.getElementById('dbContent').textContent = contentCount;

    renderNews(articles);
    setStatus('live', `${articles.length} articles loaded`);
    toast(`✓ ${articles.length} articles from Ada Derana`);

  } catch(e) {
    showErr(e.message);
    setStatus('error', 'Failed');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── RENDER ──
function renderNews(arts) {
  const isSi = lang === 'si';
  document.getElementById('sectionLabel').style.display = 'flex';
  document.getElementById('articleCount').textContent   = `${arts.length} articles`;

  const grid = document.createElement('div');
  grid.className = 'news-grid';

  arts.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="card-img">
        ${a.image
          ? `<img src="${a.image}" alt="" onerror="this.parentElement.innerHTML='🇱🇰'"><div class="card-img-fade"></div>`
          : '🇱🇰'}
        <div class="card-badge">${a.source}</div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-time">${ago(a.publishedAt)}</span>
          <span class="card-dot"></span>
          <span class="card-cat">${cat}</span>
          ${isSi ? '<span class="card-si">සිංහල</span>' : ''}
        </div>
        <div class="card-title${isSi ? ' si' : ''}">${a.title}</div>
        <div class="card-desc${isSi ? ' si' : ''}">${a.description ? a.description.slice(0, 130) + '…' : 'No description.'}</div>
        <div class="card-footer">
          <a class="card-link" href="${a.url}" target="_blank">🔗 Source</a>
          <button class="card-detail-btn" onclick="openArticle(${i})">📄 Full Details</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('newsContainer').innerHTML = '';
  document.getElementById('newsContainer').appendChild(grid);
}

// ── OPEN ARTICLE MODAL ──
function openArticle(i) {
  const a     = articles[i];
  const isSi  = a.lang === 'si';
  const overlay = document.getElementById('modalOverlay');

  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('modalTitle').className   = `modal-title${isSi ? ' si' : ''}`;
  document.getElementById('modalLink').href         = a.url;
  document.getElementById('modalMeta').innerHTML    = `
    <span>⏰ ${ago(a.publishedAt)}</span>
    <span>•</span>
    <span>📡 ${a.source}</span>
    <span>•</span>
    <span style="color:var(--gold)">${cat.toUpperCase()}</span>
    ${isSi ? '<span>• <span style="color:var(--saffron)">සිංහල</span></span>' : ''}`;

  const imgEl = document.getElementById('modalImg');
  if (a.image) { imgEl.src = a.image; imgEl.style.display = 'block'; }
  else { imgEl.style.display = 'none'; }

  const contentEl = document.getElementById('modalContent');
  contentEl.className = `modal-content${isSi ? ' si' : ''}`;
  const cleaned = stripHTML(a.content || a.description || '');
  contentEl.textContent = cleaned.length > 30 ? cleaned : (a.description || 'No content available.');

  overlay.classList.add('open');
  overlay.style.display = 'flex';
}

function closeModal() {
  const o = document.getElementById('modalOverlay');
  o.classList.remove('open'); o.style.display = 'none';
}

function bgClose(e) { if (e.target.id === 'modalOverlay') closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── HELPERS ──
function extractImg(html) {
  if (!html) return null;
  const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  return m ? m[1] : null;
}

function stripHTML(html) {
  if (!html) return '';
  return html
    .replace(/<script[\s\S]*?<\/script>/gi, '')
    .replace(/<style[\s\S]*?<\/style>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"').replace(/\s{2,}/g, ' ')
    .trim();
}

function ago(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60)    return 'Just now';
  if (s < 3600)  return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function setStatus(state, text) {
  document.getElementById('statusDot').className  = `status-dot${state === 'live' ? ' live' : state === 'error' ? ' error' : ''}`;
  document.getElementById('statusText').textContent = text;
}

function showErr(m) {
  const b = document.getElementById('errorBar');
  b.textContent = '⚠️ ' + m; b.classList.add('show');
}

function hideErr() { document.getElementById('errorBar').classList.remove('show'); }

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
